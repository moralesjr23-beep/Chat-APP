<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>The Vault</title>
<style>
:root{
  --bg:#09101c; --bg2:#0e1628; --panel:#111b31; --panel2:#182542; --panel3:#203154;
  --text:#f6f8fc; --muted:#9eb0ca; --accent:#c8a96b; --accent2:#efd39b; --border:#2a3960;
  --good:#7ee0b0; --warn:#f0ca6c; --bad:#f79a9a; --shadow:0 10px 30px rgba(0,0,0,.28);
}
:root[data-theme="light"]{
  --bg:#f3f6fb; --bg2:#edf2f9; --panel:#ffffff; --panel2:#edf3fa; --panel3:#e3ebf6;
  --text:#111827; --muted:#52627a; --accent:#8a5a12; --accent2:#b98020; --border:#cfd8e6;
  --good:#166534; --warn:#a16207; --bad:#b91c1c; --shadow:0 12px 28px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:
radial-gradient(circle at top left, rgba(200,169,107,.12), transparent 22%),
linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
body{padding-bottom:32px}
button,input,select,textarea{font:inherit}
.app{max-width:1400px;margin:0 auto;padding:18px}
.sticky{position:sticky;top:0;z-index:20;padding-bottom:12px;background:linear-gradient(180deg, rgba(9,16,28,.96), rgba(9,16,28,.84), transparent)}
:root[data-theme="light"] .sticky{background:linear-gradient(180deg, rgba(243,246,251,.97), rgba(243,246,251,.88), transparent)}
.topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-end;flex-wrap:wrap;padding-top:8px}
.brand small{display:block;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-size:11px}
.brand h1{margin:.18rem 0;font-size:clamp(28px,4vw,42px);line-height:1.05}
.brand p{margin:0;color:var(--muted)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.grid{display:grid;gap:16px}
.cols-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.cols-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.cols-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:var(--shadow)}
:root[data-theme="light"] .card{background:linear-gradient(180deg,var(--panel),var(--panel2))}
.card.soft{background:var(--panel2)}
.card h3,.card h4{margin:.15rem 0 .5rem 0}
.kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.muted{color:var(--muted)}
.tabs,.subtabs{display:flex;gap:8px;flex-wrap:wrap}
.btn,.tab,.subtab{appearance:none;border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px 14px;border-radius:16px;cursor:pointer;transition:.18s transform,.18s background,.18s border-color}
.btn:hover,.tab:hover,.subtab:hover{transform:translateY(-1px)}
.tab.active,.subtab.active{background:var(--panel3);border-color:var(--accent);color:var(--text)}
:root[data-theme="light"] .tab.active,:root[data-theme="light"] .subtab.active{background:#dbe7f7;color:#111827;border-color:var(--accent)}
.action{display:inline-flex;align-items:center;justify-content:center;gap:8px}
.field{display:flex;flex-direction:column;gap:6px;min-width:220px;flex:1}
label.small{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}
input,select,textarea{width:100%;padding:12px 14px;border-radius:16px;border:1px solid var(--border);background:var(--panel2);color:var(--text);outline:none}
:root[data-theme="light"] input,:root[data-theme="light"] select,:root[data-theme="light"] textarea{background:#fff;color:#111827}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:110px;resize:vertical}
.stat{padding:16px;border-radius:22px;border:1px solid var(--border);background:var(--panel2)}
.stat .num{font-size:30px;font-weight:700;line-height:1.05}
.pill{display:inline-block;padding:5px 9px;border-radius:999px;border:1px solid var(--border);background:var(--panel3);font-size:12px;margin:2px 6px 2px 0}
:root[data-theme="light"] .pill{background:#dde7f3}
.listbtn{width:100%;text-align:left;background:var(--panel2);border:1px solid var(--border);padding:14px;border-radius:18px;color:var(--text);cursor:pointer}
.listbtn:hover{border-color:var(--accent)}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.hr{height:1px;background:var(--border);margin:12px 0}
.score.good{color:var(--good)} .score.warn{color:var(--warn)} .score.bad{color:var(--bad)}
.modal-wrap{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.58);display:flex;align-items:center;justify-content:center;padding:20px}
.modal{width:min(980px,100%);max-height:88vh;overflow:auto;border-radius:28px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel),var(--panel2));padding:20px;box-shadow:var(--shadow)}
.smalltxt{font-size:13px}
.hero{display:grid;grid-template-columns:1.3fr .9fr;gap:16px}
@media (max-width: 980px){ .hero{grid-template-columns:1fr} }
.footer-note{text-align:center;color:var(--muted);font-size:12px;margin-top:10px}
</style>
</head>

function esc(s){ return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
function norm(s){ return String(s||"").toLowerCase().trim(); }
function dnatags(f){ return (f.d||[]).map(norm); }
function isOil(f){ return /oil/i.test(f.h||"") || /oil/i.test(f.n||""); }

function simplifyDNAList(tags){
  const raw = (tags||[]).map(norm);
  const out = [];
  const add = x => { if (x && !out.includes(x)) out.push(x); };
  const hasAny = (text, words) => words.some(word => text.includes(word));

  raw.forEach(t => {
    if (hasAny(t, [
      "fresh","clean","airy","soap","soapy","tea","breezy","crisp","icy","watery","mountain-clean","easy wear","easy daytime fresh",
      "bright","sparkling","spring elegance","everyday fresh","luxury freshness","clean vibe","skin-scent","freshness"
    ])) add("Fresh");

    if (hasAny(t, [
      "citrus","orange","grapefruit","bergamot","lemon","lime","mandarin","neroli","orange blossom","citrus burst","citrus woods",
      "citrus aromatic","citrus musk","pineapple orange","ginger grapefruit","minty fruity citrus","juicy citrus","bright citrus"
    ])) add("Citrus");

    if (hasAny(t, [
      "aquatic","marine","watery","salty","ocean","beach","poolside","sea","melon musk","marine sweetness","breezy marine",
      "sparkling aquatic","fruity aquatic","watery woods"
    ])) add("Aquatic");

    if (hasAny(t, [
      "blue","blue incense","blue woods","blue aromatic","blue fresh","blue designer","modern blue","blue-night"
    ])) add("Blue");

    if (hasAny(t, [
      "green","grassy","grass","green tea","green pineapple","fresh cut grass","green aromatic","mossy","moss","minty","herbal"
    ])) add("Green");

    if (hasAny(t, [
      "woods","woody","wood","sandalwood","cedar","patchouli","palo santo","creamy woods","dark woody","italian brightness",
      "refined fresh luxury","smooth woods","soft woods","elegant woods","luxury woods"
    ])) add("Woody");

    if (hasAny(t, [
      "vetiver","earthy","mineral","earthiness","mineral freshness","mineral woods","dry mineral","earthy masculine","soil"
    ])) add("Vetiver / Earthy");

    if (hasAny(t, [
      "fougere","barbershop","shaving cream","lavender herbs","aromatic","aromatic woods","sporty elegance","modern gentleman",
      "classic masculine","polished masculine","retro vibe","lavender"
    ])) add("Fougere");

    if (hasAny(t, [
      "musk","musky","musky amber","musky citrus","powdery","powder","iris","soft soapiness","powdery soapiness","white musk",
      "velvety powder","smooth easy wear","soft musk","clean white musk"
    ])) add("Musk / Powdery");

    if (hasAny(t, [
      "amber","ambered","amberwood","ambered masculinity","amber warmth","rich ambers","gold amber","saffron amber",
      "smooth amber","amber spice","warmth","benzoin","resinous","incense","glowing woody sugar"
    ])) add("Amber");

    if (hasAny(t, [
      "sweet","sweetness","vanilla","sugary","sugar","cotton candy","playful sweet","sweet masculine","sweet aromatic","sweet woods",
      "sweet spicy","hazelnut","toffee","honey","praline","apple pie","spun sugar","creme brulee","richness"
    ])) add("Sweet");

    if (hasAny(t, [
      "spice","spicy","cardamom","cinnamon","pepper","ginger","gingerbread","saffron","warm spicy","spicebomb"
    ])) add("Spicy");

    if (hasAny(t, [
      "gourmand","coffee","chocolate","caramel","dessert","boozy","rum","chestnut","pie","cola","tonka","tobacco vanilla",
      "apple pie","cozy gourmand","cherry cola","cacao","burnt woods vanilla","boozy cinnamon","boozy apple"
    ])) add("Gourmand");
  });

  return out.length ? out.slice(0,7) : ["Fresh"];
}

function simplifyOccasionList(occasions, dnaTags){
  const raw = (occasions||[]).map(norm);
  const dna = (dnaTags||[]).map(norm);
  const out = [];
  const add = x => { if (x && !out.includes(x)) out.push(x); };

  raw.forEach(o => {
    if (/office|work|business/.test(o)) add("Office");
    if (/date|romantic/.test(o)) add("Date");
    if (/casual|weekend|everyday|daytime|social|outdoors|outdoor|beach|vacation|fresh|smart casual|versatile/.test(o)) add("Casual");
    if (/evening|night|formal|special occasion|special|cocktail|upscale|club|lounge|bar|statement/.test(o)) add("Evening");
    if (/gym|sport|poolside/.test(o)) add("Gym");
  });

  if (!out.length){
    if (dna.some(x => ["fresh","clean","citrus","aquatic","marine","blue","green","tea","soap","airy"].includes(x))) add("Casual");
    if (dna.some(x => ["amber","sweet","vanilla","boozy","spice","gourmand","dark","tobacco","oud"].includes(x))) add("Evening");
    if (dna.some(x => ["musk","fougere","woody","vetiver","iris","neroli","lavender","powdery"].includes(x))) add("Office");
  }

  if (!out.includes("Gym") && dna.some(x => ["fresh","clean","aquatic","marine","citrus","blue"].includes(x)) && raw.some(o => /casual|sport|everyday|gym/.test(o))) add("Gym");
  return out.length ? out.slice(0,4) : ["Casual"];
}

function getWeatherLabel(code){

  if ([71,73,75,77].includes(code)) return "Snow";

function scoreFragrance(f, weights, weather=null, environment="Mixed"){
  const dna = dnatags(f);
  let score = f.r || 0;
  dna.forEach(tag => score += (weights[tag]||0));
  const season = norm(f.s);
  const temp = weather && typeof weather.temp === "number" ? weather.temp : null;
  if (temp !== null){
    if (temp <= 55){
      if (/fall|winter|year-round/.test(season)) score += 2;
      if (/spring · summer|spring|summer/.test(season)) score -= 2;
      if (dna.includes("fresh")) score += environment==="Indoors" ? 0 : -2;
      if (dna.includes("aquatic") || dna.includes("marine")) score += environment==="Indoors" ? -1 : -3;
      if (dna.includes("amber") || dna.includes("woody") || dna.includes("spice")) score += 2;
      if (dna.includes("vetiver") || dna.includes("earthy") || dna.includes("mineral")) score += 1;
    }
    if (temp >= 82){
      if (/spring|summer|year-round/.test(season)) score += 2;
      if (/fall|winter/.test(season)) score -= 2;
      if (dna.includes("fresh") || dna.includes("citrus") || dna.includes("clean") || dna.includes("aquatic")) score += environment==="Indoors" ? 1 : 3;
      if (dna.includes("oud") || dna.includes("tobacco") || dna.includes("gourmand") || dna.includes("dark")) score -= environment==="Indoors" ? 1 : 4;
    }
  }
  if (environment === "Indoors"){
    if (dna.some(x=>["clean","musk","woody","vetiver","fougere","tea","soap"].includes(x))) score += 1;
    if (dna.some(x=>["dark","smoky","loud"].includes(x))) score -= 2;
  }
  return score;
}

function getWeatherAdjustedWeights(baseWeights, weather){
  const w = {...baseWeights};
  const temp = weather && typeof weather.temp === "number" ? weather.temp : null;
  if (temp !== null){
    if (temp <= 55){ w.amber=(w.amber||0)+2; w.woody=(w.woody||0)+1; w.spice=(w.spice||0)+1; w.fresh=(w.fresh||0)-1; w.aquatic=(w.aquatic||0)-2; }
    if (temp >= 82){ w.fresh=(w.fresh||0)+2; w.clean=(w.clean||0)+1; w.citrus=(w.citrus||0)+1; w.amber=(w.amber||0)-2; w.oud=(w.oud||0)-3; w.tobacco=(w.tobacco||0)-3; }
  }
  return w;
}

function pickTop(items, weights, count=3, weather=null, environment="Mixed"){
  const ranked = [...items]
    .map(item=>({item, score: scoreFragrance(item, weights, weather, environment)}))
    .sort((a,b)=>b.score-a.score);
  const out = [];
  const seen = new Set();
  for (const row of ranked){
    if (seen.has(row.item.n)) continue;
    seen.add(row.item.n);
    out.push(row.item);
    if (out.length >= count) break;
  }
  return out;
}

function getAdvisorLabel(i){ return ["Safest","Most unique","Best performer","Strong backup","Fifth option"][i] || `Pick ${i+1}`; }

function isPlaneSafeFragrance(f){
  const dna = dnatags(f);
  const season = norm(f.s);
  const occasions = (f.o||[]).map(norm);
  const tooHeavy = dna.some(x=>["oud","tobacco","gourmand","dark","smoky","loud","statement","bold"].includes(x));
  const tooSweet = dna.filter(x=>["sweet","amber","vanilla","boozy"].includes(x)).length >= 2;
  const officeLike = occasions.some(x=>/office|casual|daytime|smart casual|everyday|versatile/.test(x));
  const safeDNA = dna.some(x=>["clean","musk","woody","vetiver","fresh","citrus","blue","aquatic","earthy","herbal","mineral","tea","soap"].includes(x));
  if (tooHeavy) return false;
  if (tooSweet && !dna.some(x=>["clean","musk","vetiver","earthy","tea","soap"].includes(x))) return false;
  if (/fall|winter/.test(season) && !safeDNA && !officeLike) return false;
  return safeDNA || officeLike;
}

function getPlaneSafePicks(items, weather, environment, count=5){
  const pool = items.filter(isPlaneSafeFragrance);
  const source = pool.length ? pool : items;
  const weights = getWeatherAdjustedWeights(RECOMMENDATION_WEIGHTS.Plane, weather);
  return pickTop(source, weights, count, weather, environment);
}

function groupBy(items, keyFn){

  return [...m.entries()].sort((a,b)=>String(a[0]).localeCompare(String(b[0])));
}

function getLayeringAnalysis(base, top){
  if (!base || !top) return {score:0, verdict:"Pick two fragrances to analyze.", why:"", ratio:"", sprays:""};
  const bd = dnatags(base), td = dnatags(top);
  const shared = bd.filter(x=>td.includes(x));
  const contrast = (bd.includes("fresh") && td.includes("amber")) || (bd.includes("citrus") && td.includes("woody")) || (bd.includes("blue") && td.includes("musk")) || (bd.includes("vetiver") && td.includes("citrus"));
  const clash = (bd.includes("smoky") && td.includes("aquatic")) || (bd.includes("oud") && td.includes("airy")) || (bd.includes("gourmand") && td.includes("marine"));
  let raw = 5 + shared.length*1.5 + (contrast?1:0) - (clash?2:0);
  let score = Math.max(1, Math.min(10, Math.round(raw)));
  let verdict = score>=9 ? "Excellent layering match" : score>=7 ? "Very good layering match" : score>=5 ? "Borderline combo" : "Do not layer these";
  let ratio = score<=4 ? "Not recommended" : score>=8 ? "2 sprays base + 2 sprays top" : score>=5 ? "2 sprays base + 1 light spray top" : "2 sprays base + 1 spray top";
  let sprays = score<=4 ? "Skip this layering combo. Wear one of them on its own instead." : score>=8 ? "Apply the base first on chest and one side of neck, then the top on the other side of neck and shirt for lift." : "Apply the base to chest and neck, then add the top fragrance lightly.";
  let why = "";

  if (score>=8) {
    why += "This pairing is strong because the two fragrances already share enough structure to read as one intentional scent cloud instead of two separate fragrances fighting for attention. ";
    why += "The overlap gives the blend a clean transition from opening to drydown, so the top fragrance adds dimension without breaking the identity of the base. ";
  } else if (score>=5) {
    why += "This pairing can work, but it needs control because the two fragrances are not naturally seamless. ";
    why += "One side should stay in the lead, usually the base, while the second scent should behave more like an accent that adds brightness, sweetness, texture, or lift. ";
    why += "If you spray both too heavily, the blend can lose definition and start to feel muddy, blurred, or louder than you intended. ";
  } else {
    why += "These two are not a strong layering match because their scent structures pull in different directions. ";
    why += "Instead of blending into one smooth profile, they are more likely to clash in the air and create confusion between the opening, heart, and drydown. ";
  }

  if (shared.length) {
    why += `They overlap on ${shared.join(", ")}, which gives the combination a shared backbone and helps the transition feel smoother on skin. `;
  } else {
    why += "They do not share much direct overlap, so balance matters even more if you decide to test them together. ";
  }

  if (contrast) {
    why += "There is also a useful contrast here, which can make the combo more interesting when kept light. ";
    why += "That contrast works best when the second fragrance stays supportive instead of trying to dominate the whole scent profile. ";
  }

  if (clash) {
    why += "There is a structural clash in this pairing, so overspraying will make it feel messy very quickly. ";
    why += "That is why the spray plan stays conservative. ";
  }

  if (score>=5 && score<=7) {
    why += "The safest way to wear this is to let the base do most of the work, then use the top fragrance only to sharpen the opening or add a small twist. ";
  }

  return {score, verdict, why: why.trim(), ratio, sprays};
}

function getLayeringSuggestions(collection, occasion, weather){
  if (occasion === "Plane") return [];
  const pool = collection.filter(f=>(f.o||[]).includes(occasion));
  const usable = pool.length ? pool : collection;
  const weights = getWeatherAdjustedWeights(RECOMMENDATION_WEIGHTS[occasion==="Special Event"?"SpecialEvent":occasion] || {}, weather);
  const ranked = [...usable].sort((a,b)=>scoreFragrance(b,weights,weather,"Mixed")-scoreFragrance(a,weights,weather,"Mixed"));
  const out = [], seen = new Set();
  for (let i=0;i<Math.min(ranked.length,12);i++) {
    for (let j=0;j<Math.min(ranked.length,12);j++) {
      if (i===j) continue;
      const base = ranked[i], top = ranked[j];
      const key = [base.n, top.n].sort().join("__");
      if (seen.has(key)) continue;
      const analysis = getLayeringAnalysis(base, top);
      if (analysis.score <= 4) continue;
      seen.add(key);
      out.push({base, top, analysis, rank: analysis.score + scoreFragrance(base,weights,weather) + scoreFragrance(top,weights,weather)});
    }
  }
  return out.sort((a,b)=>b.rank-a.rank).slice(0,6);
}

function scoreDisplay(f, season){
  const dna = dnatags(f);
  const s = norm(f.s);
  let score = f.r || 0;

  const has = txt => s.includes(txt.toLowerCase());
  const boost = n => score += n;
  const penalize = n => score -= n;

  if (season==="Spring"){
    if (has("spring")) boost(5);
    if (has("spring · summer") || has("spring · fall")) boost(3);
    if (has("year-round")) boost(2);
    if (has("fall · winter")) penalize(3);
    if (dna.some(x=>["green","fresh","citrus","clean","vetiver","tea","floral"].includes(x))) boost(2);
    if (dna.some(x=>["dark","tobacco","oud","gourmand"].includes(x))) penalize(2);
  }

  if (season==="Summer"){
    if (has("summer")) boost(5);
    if (has("spring · summer")) boost(3);
    if (has("year-round")) boost(2);
    if (has("fall · winter")) penalize(4);
    if (dna.some(x=>["fresh","aquatic","clean","citrus","blue","marine","green"].includes(x))) boost(2);
    if (dna.some(x=>["dark","tobacco","oud","gourmand","boozy"].includes(x))) penalize(3);
  }

  if (season==="Fall"){
    if (has("fall")) boost(5);
    if (has("spring · fall") || has("fall · winter")) boost(3);
    if (has("year-round")) boost(2);
    if (has("spring · summer")) penalize(2);
    if (dna.some(x=>["woody","amber","vetiver","spice","earthy","fougere"].includes(x))) boost(2);
    if (dna.some(x=>["aquatic","marine"].includes(x))) penalize(1);
  }

  if (season==="Winter"){
    if (has("winter")) boost(5);
    if (has("fall · winter")) boost(3);
    if (has("year-round")) boost(2);
    if (has("spring · summer")) penalize(3);
    if (dna.some(x=>["amber","woody","dark","spice","tobacco","oud","boozy","gourmand"].includes(x))) boost(2);
    if (dna.some(x=>["aquatic","marine","citrus"].includes(x))) penalize(1);
  }

  return score;
}

function getDisplaySections(collection, season){
  const ranked = [...collection]
    .map(f => ({ item:f, displayScore:scoreDisplay(f, season) }))
    .sort((a,b)=>b.displayScore-a.displayScore);

  const display = ranked.slice(0,30).map(x=>x.item);
  const anchors = [];
  const daily = [];
  const statement = [];
  const used = new Set();

  const add = (arr, f) => {
    if (!f || used.has(f.n)) return;
    used.add(f.n);
    arr.push(f);
  };

  display.forEach(f => {
    const dna = dnatags(f);
    if (anchors.length < 8 && (f.r||0) >= 4) {
      add(anchors, f);
      return;
    }
    if (daily.length < 12 && dna.some(x=>["fresh","woody","clean","blue","green","vetiver","musk","tea","soap","citrus","aquatic","fougere"].includes(x))) {
      add(daily, f);
      return;
    }
    if (statement.length < 10 && dna.some(x=>["amber","dark","tobacco","spice","oud","boozy","gourmand"].includes(x))) {
      add(statement, f);
      return;
    }
  });

  display.forEach(f => {
    if (!used.has(f.n)) {
      if (daily.length < 12) add(daily, f);
      else if (statement.length < 10) add(statement, f);
      else if (anchors.length < 8) add(anchors, f);
    }
  });

  return {anchors, daily, statement, display};
}

function getCandidateOverlap(candidate, existing){
  const cd = (candidate.d||[]).map(norm), ed = dnatags(existing);
  const sharedDNA = cd.filter(x=>ed.includes(x));
  const sharedOcc = (candidate.o||[]).filter(x=>(existing.o||[]).includes(x));
  let score = sharedDNA.length*2 + sharedOcc.length;
  if (candidate.i && existing.i && candidate.i.toLowerCase()===existing.i.toLowerCase()) score += 4;
  if (candidate.s && existing.s && candidate.s===existing.s) score += 1;
  return {score, sharedDNA, sharedOcc};
}

function classifyBuy(best, candidate){
  if (!best) return {verdict:"Interesting but unclear", reason:"Not enough info to compare."};
  if (best.overlap.score >= 9) return {verdict:"Good but redundant", reason:`It overlaps heavily with ${best.item.n}.`};
  if (best.overlap.score >= 6) return {verdict:"Interesting but unnecessary", reason:`It still sits fairly close to ${best.item.n}.`};
  return {verdict:"Worth considering", reason:"It looks different enough to fill a gap."};
}

async function fetchWeather(pref){
  try {
    if (pref.mode==="manual" && pref.city) {
      const ge = await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(pref.city)+"&count=1&language=en&format=json").then(r=>r.json());
      if (ge.results && ge.results[0]) {
        const g = ge.results[0];
        const label = g.name + (g.admin1 ? ", " + g.admin1 : "");
        return await fetchWeatherByCoords(g.latitude, g.longitude, label);
      }
      return {loading:false,error:"City not found.",temp:null,wind:null,code:null,city:pref.city};
    }
    return new Promise(resolve=>{
      if (!navigator.geolocation) return fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve);
      navigator.geolocation.getCurrentPosition(
        pos=>fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude).then(resolve),
        _=>fetchWeatherByCoords(38.8816,-77.091,"Arlington area").then(resolve),
        {enableHighAccuracy:false, timeout:8000, maximumAge:300000}
      );
    });
  } catch(e) {
    return {loading:false,error:"Unable to load weather.",temp:null,wind:null,code:null,city:"Your area"};
  }
}

async function fetchWeatherByCoords(lat, lon, label=""){
  const wd = await fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph").then(r=>r.json());
  let city = label || "Your area";
  if (!label) {
    try {
      const ge = await fetch("https://geocoding-api.open-meteo.com/v1/reverse?latitude="+lat+"&longitude="+lon+"&language=en&format=json").then(r=>r.json());
      if (ge.results && ge.results[0]) city = ge.results[0].name || ge.results[0].admin1 || city;
    } catch(e) {}
  }
  return {
    loading:false,error:"",
    temp:wd.current ? wd.current.temperature_2m : null,
    wind:wd.current ? wd.current.wind_speed_10m : null,
    code:wd.current ? wd.current.weather_code : null,
    city
  };
}

function collectionView(){

  let grouped = [];
  if (state.collectionView==="House") grouped = groupBy(filtered, f=>f.h);
  if (state.collectionView==="DNA") grouped = groupBy(filtered, f=>displayDNAList(f));
  if (state.collectionView==="Inspiration") grouped = groupBy(filtered, f=>f.i || "Original / Unspecified");
  if (state.collectionView==="Occasion") grouped = groupBy(filtered, f=>displayOccasionList(f));
  if (state.collectionView==="Plane") {

      .filter(isPlaneSafeFragrance)
      .map(f=>({...f, planeGuidance:getSprayAdvice(f,"Plane"), planeScore:scoreFragrance(f,getWeatherAdjustedWeights(RECOMMENDATION_WEIGHTS.Plane,state.weather),state.weather,"Indoors")}))

function buySkipView(){
  const candidate = {
    n: state.buy.name.trim(),
    h: state.buy.house.trim(),
    i: state.buy.inspiration.trim(),
    d: state.buy.dna.split(",").map(x=>x.trim()).filter(Boolean),
    o: state.buy.occasions.split(",").map(x=>x.trim()).filter(Boolean),
    s: state.buy.season
  };
  const ranked = (!candidate.n && !candidate.i && !candidate.d.length)
    ? []
    : COLLECTION.map(item=>({item, overlap:getCandidateOverlap(candidate,item)})).sort((a,b)=>b.overlap.score-a.overlap.score).slice(0,5);
  const best = ranked[0];
  const decision = classifyBuy(best, candidate);

  return `
  <div class="grid">
    <div class="card">

      <h3>Gap fill or redundancy check</h3>
      <div class="row">

      <div class="row" style="margin-top:12px">
        <div class="field"><label class="small">DNA tags</label><input id="buyDNA" value="${esc(state.buy.dna)}" placeholder="fresh, woody, citrus, aquatic" /></div>
        <div class="field"><label class="small">Occasions</label><input id="buyOccasions" value="${esc(state.buy.occasions)}" placeholder="Office, Casual, Date" /></div>
      </div>

    <div class="grid cols-3">
      <div class="stat"><div class="kicker">Verdict</div><div class="num" style="font-size:24px">${esc(decision.verdict)}</div><div>${esc(decision.reason)}</div></div>
      <div class="stat"><div class="kicker">Closest match</div><div class="num" style="font-size:24px">${best ? esc(best.item.n) : "—"}</div><div class="muted">${best ? esc(best.item.h) : ""}</div><div style="margin-top:6px">Overlap score: ${best ? best.overlap.score : "—"}</div></div>
      <div class="stat"><div class="kicker">Why</div><div>${best ? `Shared DNA: ${best.overlap.sharedDNA.join(", ")||"none"}. Shared occasions: ${best.overlap.sharedOcc.join(", ")||"none"}.` : "Add candidate details to compare it."}</div></div>
    </div>

    <div class="card">
      <div class="kicker">Top overlaps</div>
      <div class="grid cols-3" style="margin-top:12px">
        ${ranked.length ? ranked.map(({item,overlap})=>`
          <div class="card soft">
            <div><strong>${esc(item.n)}</strong></div>
            <div class="muted">${esc(item.h)}</div>
            <div class="smalltxt" style="margin-top:8px">Overlap score: ${overlap.score}</div>
            <div class="smalltxt muted">DNA overlap: ${esc(overlap.sharedDNA.join(", ") || "none")}</div>
            <div class="smalltxt muted">Occasion overlap: ${esc(overlap.sharedOcc.join(", ") || "none")}</div>

        `).join("") : `<div class="muted">Add a fragrance name plus some DNA or inspiration info.</div>`}

    </div>

}

function bindValue(id, fn){
  const el = document.getElementById(id);
  if (!el) return;
  el.oninput = el.onchange = e => fn(e.target.value);
}

function bindEvents(){
  const themeToggle = document.getElementById("themeToggle");
  if (themeToggle) themeToggle.onclick = ()=>{ state.theme = state.theme==="dark" ? "light" : "dark"; saveTheme(); render(); };

  document.querySelectorAll("[data-tab]").forEach(el=> el.onclick = ()=>{ state.tab = el.dataset.tab; render(); });
  document.querySelectorAll("[data-cview]").forEach(el=> el.onclick = ()=>{ state.collectionView = el.dataset.cview; state.collectionGroup=""; render(); });
  document.querySelectorAll("[data-open]").forEach(el=> el.onclick = ()=>{ state.selectedFragrance = COLLECTION.find(f=>f.n===el.dataset.open) || null; render(); });

  const modalClose = document.getElementById("modalClose");
  if (modalClose) modalClose.onclick = ()=>{ state.selectedFragrance=null; render(); };
  const modalWrap = document.getElementById("modalWrap");
  if (modalWrap) modalWrap.onclick = ()=>{ state.selectedFragrance=null; render(); };

  bindValue("weatherMode", v=>{ state.weatherPref.mode=v; saveWeatherPref(); loadWeather(); });
  bindValue("manualCity", v=>{ state.weatherPref.city=v; saveWeatherPref(); });
  const manualCity = document.getElementById("manualCity");
  if (manualCity) manualCity.onchange = ()=> loadWeather();

  bindValue("homeOccasion", v=>{ state.homeOccasion=v; render(); });
  bindValue("homeEnvironment", v=>{ state.homeEnvironment=v; render(); });

  bindValue("collectionSearch", v=>{ state.collectionSearch=v; render(); });
  bindValue("collectionGroup", v=>{ state.collectionGroup=v; render(); });

  bindValue("wearOccasion", v=>{ state.wearOccasion=v; render(); });
  bindValue("wearEnvironment", v=>{ state.wearEnvironment=v; render(); });
  bindValue("wearSelected", v=>{ state.wearSelected=v; if(!state.wearAmount){ const f=COLLECTION.find(x=>x.n===v); if(f) state.wearAmount=getSprayAdvice(f,state.wearOccasion); } render(); });
  bindValue("wearAmount", v=>{ state.wearAmount=v; });
  bindValue("wearNotes", v=>{ state.wearNotes=v; });

  document.querySelectorAll("[data-apply-pick]").forEach(el=> el.onclick = ()=>{
    const pick = COLLECTION.find(f=>f.n===el.dataset.applyPick);
    if (!pick) return;
    state.wearSelected = pick.n;
    state.wearAmount = getSprayAdvice(pick, state.wearOccasion);
    if (!state.wearNotes) state.wearNotes = `Generated pick for ${state.wearOccasion}.`;
    render();
  });

  const saveWearBtn = document.getElementById("saveWear");
  if (saveWearBtn) saveWearBtn.onclick = ()=>{
    const selected = COLLECTION.find(f=>f.n===state.wearSelected);
    if (!selected) return;
    state.wearLog.unshift({
      date:new Date().toISOString().slice(0,10),
      fragrance:selected.n,
      house:selected.h,
      occasion:state.wearOccasion,
      amount:state.wearAmount || getSprayAdvice(selected, state.wearOccasion),
      notes:state.wearNotes.trim()
    });
    saveWearLog();
    state.wearNotes="";
    render();
  };

  bindValue("layerBaseQuery", v=>{ state.layerBaseQuery=v; render(); });
  bindValue("layerTopQuery", v=>{ state.layerTopQuery=v; render(); });
  bindValue("layerBase", v=>{ state.layerBase=v; render(); });
  bindValue("layerTop", v=>{ state.layerTop=v; render(); });
  bindValue("layerOccasion", v=>{ state.layerOccasion=v; render(); });
  bindValue("layerEnvironment", v=>{ state.layerEnvironment=v; render(); });

  bindValue("displaySeasonMode", v=>{ state.displaySeasonMode=v; render(); });

  bindValue("buyName", v=>{ state.buy.name=v; render(); });
  bindValue("buyHouse", v=>{ state.buy.house=v; render(); });
  bindValue("buyInspo", v=>{ state.buy.inspiration=v; render(); });
  bindValue("buyDNA", v=>{ state.buy.dna=v; render(); });
  bindValue("buyOccasions", v=>{ state.buy.occasions=v; render(); });
  bindValue("buySeason", v=>{ state.buy.season=v; render(); });
}

async function loadWeather(){
  state.weather = {loading:true,error:"",temp:null,wind:null,code:null,city:state.weatherPref.mode==="manual" ? (state.weatherPref.city||"Manual city") : "Your area"};
  render();
  state.weather = await fetchWeather(state.weatherPref);
  render();
}

loadWeather();
render();
</script>
</body>
</html>
